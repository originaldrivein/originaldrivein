<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Drive.in - Media Kit Oficial 2025</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

    <style>
        /* ================= GLOBALS & LAYOUT ================= */
        body { margin: 0; padding: 0; background-color: #050505; font-family: 'Montserrat', sans-serif; color: #FFFFFF; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .page-container { width: 1280px; max-width: 100%; background-color: #0A0A0A; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .slide-section { width: 1280px; height: 720px; position: relative; overflow: hidden; background-color: #0A0A0A; border-bottom: 2px solid #1a1a1a; display: flex; }

        /* Classes de Texto Universais */
        .section-title { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 3rem; color: #FFFFFF; line-height: 1; margin: 0; letter-spacing: 0.05em; }
        .accent-text { color: #F7D11E; }
        .header-bar { display: flex; justify-content: space-between; align-items: flex-end; padding: 40px 60px 20px 60px; z-index: 10; width: 100%; }

        /* ================= SECTION 1 (CAPA) ================= */
        .slide-section-col { flex-direction: column; }
        .band-logo { font-family: 'Oswald', sans-serif; letter-spacing: -0.05em; text-shadow: 0px 0px 20px rgba(0,0,0,0.8); }
        .glitch-bar { background-color: #F7D11E; box-shadow: 0 0 10px rgba(247, 209, 30, 0.5); }
        .s1-noise { background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E'); }

        /* ================= SECTION 2 (SOBRE) ================= */
        .left-panel { flex: 1; padding: 40px 50px; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 10; }
        .right-panel { width: 45%; position: relative; overflow: hidden; }
        .right-panel::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.2); pointer-events: none; }
        .image-container-s2 { width: 100%; height: 100%; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%); margin-left: -50px; position: relative; z-index: 5; }
        .timeline-item { position: relative; padding-left: 30px; margin-bottom: 25px; border-left: 2px solid #333; }
        .timeline-item::before { content: ''; position: absolute; left: -6px; top: 5px; width: 10px; height: 10px; background-color: #F7D11E; border-radius: 50%; }
        .deco-line { height: 4px; width: 60px; background-color: #F7D11E; margin-bottom: 20px; }

        /* ================= SECTION 3 (DISCOGRAFIA) ================= */
        .bg-grid-svg { background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%231a1a1a\' fill-opacity=\'0.4\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E'); }
        .album-grid-container { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; padding: 10px 60px 40px 60px; width: 100%; }
        .album-card { display: flex; background-color: #111; border: 1px solid #222; overflow: hidden; transition: transform 0.3s ease; position: relative; }
        .album-card:hover { border-color: #F7D11E; transform: translateY(-2px); }
        .album-cover-container { width: 200px; height: 200px; flex-shrink: 0; position: relative; }
        .album-cover { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.3s ease; }
        .album-card:hover .album-cover { filter: grayscale(0%); }
        .album-info { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        .album-year { font-family: 'Oswald', sans-serif; font-size: 0.9rem; color: #F7D11E; margin-bottom: 5px; display: inline-block; background-color: rgba(247, 209, 30, 0.1); padding: 2px 8px; width: fit-content; }
        .album-title { font-family: 'Oswald', sans-serif; font-size: 1.8rem; margin-bottom: 10px; line-height: 1.1; text-transform: uppercase; }
        .track-list { list-style-type: none; padding: 0; margin: 0; }
        .track-item { font-size: 0.8rem; color: #aaa; margin-bottom: 4px; display: flex; align-items: center; }
        .track-item i { font-size: 0.6rem; margin-right: 8px; color: #555; }
        .album-card:hover .track-item i { color: #F7D11E; }
        .corner-accent { position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 40px 40px 0; border-color: transparent #F7D11E transparent transparent; opacity: 0; transition: opacity 0.3s ease; }
        .album-card:hover .corner-accent { opacity: 1; }
        .bg-year-text { position: absolute; right: 10px; bottom: 0; font-family: 'Oswald', sans-serif; font-size: 6rem; font-weight: bold; color: rgba(255, 255, 255, 0.03); line-height: 0.8; pointer-events: none; }

        /* ================= SECTION 4 (FOTOS DESTAQUE) ================= */
        .bg-dots { background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="%23FFFFFF" fill-opacity="1" fill-rule="evenodd"%3E%3Ccircle cx="3" cy="3" r="3"/%3E%3Ccircle cx="13" cy="13" r="3"/%3E%3C/g%3E%3C/svg%3E'); opacity: 0.03; position: absolute; inset: 0; pointer-events: none; }
        .gallery-grid { flex: 1; display: grid; grid-template-columns: 1.5fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; padding: 10px 60px 50px 60px; z-index: 10; width: 100%; }
        .gallery-item-1 { grid-column: 1 / 2; grid-row: 1 / 3; }
        .gallery-item-2 { grid-column: 2 / 3; grid-row: 1 / 2; }
        .gallery-item-3 { grid-column: 3 / 4; grid-row: 1 / 2; }
        .gallery-item-4 { grid-column: 2 / 4; grid-row: 2 / 3; }
        .photo-card { position: relative; width: 100%; height: 100%; overflow: hidden; border: 1px solid #333; transition: all 0.3s ease; }
        .photo-card:hover { border-color: #F7D11E; transform: scale(1.01); z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .photo-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.1); transition: filter 0.5s ease; }
        .photo-card:hover .photo-img { filter: grayscale(0%) contrast(1.1); }
        .photo-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background-color: rgba(10, 10, 10, 0.8); transform: translateY(100%); transition: transform 0.3s ease; }
        .photo-card:hover .photo-overlay { transform: translateY(0); }
        .corner-decoration { position: absolute; top: 20px; right: 20px; width: 100px; height: 100px; border-top: 2px solid #F7D11E; border-right: 2px solid #F7D11E; opacity: 0.5; z-index: 5; }

        /* ================= SECTION 5 (VIDEOS) ================= */
        .bg-boxes { background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23ffffff" fill-opacity="1"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0
